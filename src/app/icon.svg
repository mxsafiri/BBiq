<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#0d0d0d"/>
  <!-- billboard panel -->
  <rect x="5" y="6" width="22" height="14" rx="1.5" fill="#00ff88" opacity="0.15"/>
  <rect x="5" y="6" width="22" height="14" rx="1.5" stroke="#00ff88" stroke-width="1.5"/>
  <!-- signal bars inside panel -->
  <rect x="9"  y="14" width="3" height="3" rx="0.5" fill="#00ff88"/>
  <rect x="14" y="11" width="3" height="6" rx="0.5" fill="#00ff88"/>
  <rect x="19" y="8"  width="3" height="9" rx="0.5" fill="#00ff88"/>
  <!-- pole -->
  <rect x="15" y="20" width="2" height="6" rx="0.5" fill="#00ff88" opacity="0.6"/>
  <!-- base -->
  <rect x="11" y="25" width="10" height="1.5" rx="0.75" fill="#00ff88" opacity="0.4"/>
